<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drone Premium</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-pin">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" class="bg">

    <h1 class="hero-title">A New Dimension of Filmmaking</h1>
  </div>
</section>

<!-- STEP SECTION -->
<section class="steps-section">

  <div class="container">

    <div class="left">
      <h1>Real Estate,<br><span>Rewired.</span></h1>
      <button>Start Your Search →</button>
    </div>

    <div class="right">
      <div class="step"><span>01</span><p><strong>Talk to a Real Human.</strong> We match you with an expert.</p></div>
      <div class="step"><span>02</span><p><strong>Get Clarity.</strong> We define your needs.</p></div>
      <div class="step"><span>03</span><p><strong>Move Forward.</strong> We make it happen.</p></div>
    </div>

  </div>

</section>

<!-- VIDEO -->
<section class="video-section">
  <div class="video-wrapper">
    <video autoplay muted loop>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4">
    </video>
    <div class="video-mask"></div>
  </div>
</section>

<!-- HORIZONTAL -->
<section class="horizontal">
  <div class="scroll">
    <div class="card">1</div>
    <div class="card">2</div>
    <div class="card">3</div>
    <div class="card">4</div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <h2>Subscribe</h2>
</footer>

<script src="script.js"></script>
</body>
</html>
